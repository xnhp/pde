name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version override (leave empty to auto-calculate)"
        required: false
        type: string
      publish_cli:
        description: "Publish CLI distribution"
        required: true
        default: true
        type: boolean
      publish_intellij:
        description: "Publish IntelliJ plugin distribution"
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate release info
        id: release_info
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "${RELEASE_VERSION}" ]; then
            ./gradlew generateReleaseInfo -PreleaseVersion="${RELEASE_VERSION}"
          else
            ./gradlew generateReleaseInfo
          fi
          VERSION=$(cat build/release/version.txt)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<'EOF'"
            cat build/release/notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: ./gradlew check :pde-cli:distZip :intellij:buildPlugin -PpluginVersion=${{ steps.release_info.outputs.version }}

      - name: List build outputs
        run: |
          ls -R apps/pde-launch/build/distributions || true
          ls -R intellij/build/distributions || true

      - name: Publish CLI release
        if: inputs.publish_cli == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "cli/v${{ steps.release_info.outputs.version }}" \
            "apps/pde-launch/build/distributions/pde-${{ steps.release_info.outputs.version }}.zip" \
            --title "CLI v${{ steps.release_info.outputs.version }}" \
            --notes-file build/release/notes.md \
            --target "${{ github.sha }}"

      - name: Publish IntelliJ release
        if: inputs.publish_intellij == true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "ij/v${{ steps.release_info.outputs.version }}" \
            "intellij/build/distributions/intellij-${{ steps.release_info.outputs.version }}.zip" \
            --title "IntelliJ Plugin v${{ steps.release_info.outputs.version }}" \
            --notes-file build/release/notes.md \
            --target "${{ github.sha }}"
